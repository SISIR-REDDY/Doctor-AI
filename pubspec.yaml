name: docpilot
description: Clinix AI - Your personal AI health companion for symptom tracking, records, and insurance.
publish_to: 'none'
version: 2.1.0+7

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.9
  flutter_screenutil: ^5.9.3
  auto_size_text: ^3.0.0
  flutter_markdown: ^0.7.7+1

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.4.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.0.0
  firebase_remote_config: ^6.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # Authentication
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^8.0.0

  # State Management
  provider: ^6.1.5+1

  # Network & Storage
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  path: ^1.9.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  crypto: ^3.0.7
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  share_plus: ^12.0.1

  # Audio
  just_audio: ^0.10.5
  record: ^6.2.0

  # Local notifications & scheduling (medication / vaccination / appointment reminders)
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# path_provider_foundation 2.5.0+ pulls in `objective_c` and uses Flutter's
# native_assets/install_code_assets pipeline, which fails on macOS Sequoia +
# Xcode 16 with "resource fork, Finder information, or similar detritus not
# allowed" during codesign of build/native_assets/ios/objective_c.framework.
# Pinning to 2.4.x keeps path_provider on the traditional CocoaPods path, so
# plain `flutter run` works without any wrapper scripts or xattr stripping.
dependency_overrides:
  path_provider_foundation: 2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/docpilot_logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
